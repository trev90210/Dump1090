name: MSBuild

on: [push, workflow_dispatch]

env:
  SOLUTION_FILE_PATH: src/Dump1090.sln
jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        BUILD_CONFIGURATION: [ Release ]
        BUILD_PLATFORM:      [ x86, x64 ]

    steps:
    - uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1

    - name: Build
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=${{matrix.BUILD_CONFIGURATION}} /p:Platform=${{matrix.BUILD_PLATFORM}} /p:PlatformToolset=v143 ${{env.SOLUTION_FILE_PATH}}

    - name: dir
      run: |
        cmd.exe /c dir /s


    - name: package and upload
      uses: actions/upload-artifact@v5
      with:
        name: dump1090_${{matrix.BUILD_CONFIGURATION}}_${{matrix.BUILD_PLATFORM}}
        compression-level: 9
        path: |
            .
            !src
            #!testfiles
            #!*.csv
            #!*.sqlite

    # test:
    # steps:
    - name: test
      run: start dump1090.exe --config .github/dump1090.cfg --debug Gn --net --logfile dump1090-ci.log --infile testfiles/modes1.bin
      #  py.exe -3 tools\SBS_client.py --host localhost --wait 10 --port 30001 raw-out
  




